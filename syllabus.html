  <section class="section">
    <div class="section-header">সিলেবাস</div>
    <button class="btn btn-block" onclick="showClassList()">শ্রেণী নির্বাচন করুন ▼</button>
    <div id="classList" class="hidden mt-2"></div>
    <div id="subjectList" class="hidden mt-2"></div>
  </section>
</main>
<footer class="no-print"><p>© ২০২৬ লালমনিরহাট নেছারিয়া কামিল মাদ্রাসা নূরানী শাখা</p></footer>
<script>
const classes = {'shishu': 'শিশু শ্রেণী', 'class1': 'প্রথম শ্রেণী', 'class2': 'দ্বিতীয় শ্রেণী', 'class3': 'তৃতীয় শ্রেণী'};
const subjects = ['কোরআন মাজীদ ও তাজবীদ', 'কালিমা ও মাসায়েল', 'হাদিস শরীফ ও আসমাউল হুসনা', 'আদঃ মাসনুনাহ ও আদঃ সলাত', 'আরবি লেখা', 'ভূগোল সমাজ', 'বাংলা', 'ইংরেজি', 'গণিত', 'ইসলাম শিক্ষা'];
function showClassList() {
  const html = Object.entries(classes).map(([key, name]) => `<button class="btn btn-block" onclick="showSubjects('${key}', '${name}')">👶 ${name}</button>`).join('');
  document.getElementById('classList').innerHTML = html;
  document.getElementById('classList').classList.remove('hidden');
  document.getElementById('subjectList').classList.add('hidden');
}
function showSubjects(classKey, className) {
  const html = `<h3 style="text-align:center; margin-bottom:16px;">${className} - সিলেবাস</h3>` + subjects.map(sub => `
      <div class="list-item"><span>${sub}</span><button class="btn btn-blue" style="padding:6px 12px; font-size:14px;">⬇ ডাউনলোড</button></div>
    `).join('') + `<button class="btn btn-gray btn-block mt-2" onclick="document.getElementById('subjectList').classList.add('hidden')">← পিছনে যান</button>`;
  document.getElementById('subjectList').innerHTML = html;
  document.getElementById('subjectList').classList.remove('hidden');
}
</script>
